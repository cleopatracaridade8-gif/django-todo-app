databases:
  - name: todo_db
    databaseName: todo_db
    user: todo_user
    plan: free

services:
  - type: web
    name: django-todo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input
    startCommand: gunicorn todoproject.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: pserv
          name: django-secret-key
          property: value
      - key: ALLOWED_HOSTS
        value: "*.render.com"
      - key: DATABASE_URL
        fromDatabase:
          name: todo_db
          property: connectionString
