databases:
  - name: todo_db
    databaseName: todo_db
    user: todo_user
    plan: free

services:
  - type: web
    name: django-todo
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: django-insecure-render-deployment-key-change-this-value
      - key: ALLOWED_HOSTS
        value: "django-todo-app-kgab.onrender.com,*.onrender.com,localhost"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://django-todo-app-kgab.onrender.com,https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: todo_db
          property: connectionString
