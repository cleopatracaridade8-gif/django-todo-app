databases:
  - name: todo_db
    databaseName: todo_db
    user: todo_user
    plan: free

services:
  - type: web
    name: django-todo
    runtime: python
    plan: free
    buildCommand: pip install -r django_todo/requirements.txt && python django_todo/manage.py migrate --noinput && python django_todo/manage.py collectstatic --noinput
    startCommand: python django_todo/manage.py migrate --noinput && gunicorn todoproject.wsgi:application --chdir django_todo
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: django-insecure-render-deployment-key-change-this-value
      - key: ALLOWED_HOSTS
        value: "cleopatras-todo-web.onrender.com,*.render.com,localhost"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://cleopatras-todo-web.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: todo_db
          property: connectionString
