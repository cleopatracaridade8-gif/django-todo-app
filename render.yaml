databases:
  - name: todo_db
    databaseName: todo_db
    user: todo_user
    plan: free

services:
  - type: web
    name: django-todo
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn todoproject.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "True"
      - key: SECRET_KEY
        value: django-insecure-render-deployment-key-please-change-in-settings
      - key: ALLOWED_HOSTS
        value: "cleopatras-todo-web.onrender.com,*.render.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://cleopatras-todo-web.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: todo_db
          property: connectionString
